name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v0.1.0-dev)'
        required: false
        default: 'manual-build'

permissions:
  contents: write  # для создания GitHub Release

jobs:
  build:
    name: Build .exe (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/pos/pyproject.toml'

      - name: Install POS deps + PyInstaller
        working-directory: apps/pos
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # pgserver на Windows не включает tzdata → Postgres падает на
      # `SET TIME ZONE 'Asia/Dushanbe'`. Берём готовый Postgres-бандл от
      # zonky.io (его же использует embedded-postgres в Go) — там tzdata есть.
      # Распаковываем только share/timezone + share/timezonesets в pgserver.
      - name: Inject Postgres tzdata into pgserver
        shell: pwsh
        run: |
          $ver = "16.4.0"
          $jar = "https://repo1.maven.org/maven2/io/zonky/test/postgres/embedded-postgres-binaries-windows-amd64/$ver/embedded-postgres-binaries-windows-amd64-$ver.jar"
          $tmp = Join-Path $env:RUNNER_TEMP "pgbin"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          Write-Host "Downloading zonky Postgres binaries..."
          Invoke-WebRequest -Uri $jar -OutFile "$tmp\pg.jar"
          # JAR — это zip. Внутри — postgres-windows-x86_64.txz (tar.xz).
          Expand-Archive -Path "$tmp\pg.jar" -DestinationPath "$tmp\jar" -Force
          $txz = Get-ChildItem -Path "$tmp\jar" -Recurse -Filter "*.txz" | Select-Object -First 1
          Write-Host "Extracting $($txz.FullName)..."
          # tar входит в Windows 10+
          tar -xf $txz.FullName -C "$tmp\jar"
          # pgserver location
          $pgsv = python -c "import pgserver, os; print(os.path.dirname(pgserver.__file__))"
          $dest = Join-Path $pgsv "pginstall\share"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Write-Host "Copying tzdata to $dest"
          Copy-Item -Recurse -Force "$tmp\jar\share\timezone" $dest
          Copy-Item -Recurse -Force "$tmp\jar\share\timezonesets" $dest
          Write-Host "tzdata installed:"
          Get-ChildItem "$dest\timezone\Asia" | Select-Object -First 5

      - name: Build EXE (PyInstaller)
        working-directory: apps/pos
        run: |
          pyinstaller pos.spec --noconfirm --clean

      - name: Verify tzdata bundled into dist
        working-directory: apps/pos
        shell: pwsh
        run: |
          $tz = "dist\RestOS-POS\_internal\pgserver\pginstall\share\timezone\Asia\Dushanbe"
          if (Test-Path $tz) {
            Write-Host "OK: $tz bundled ($((Get-Item $tz).Length) bytes)"
          } else {
            Write-Error "MISSING: $tz not bundled by PyInstaller!"
            Get-ChildItem "dist\RestOS-POS\_internal\pgserver\pginstall\share" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Compute version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION_CLEAN="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.release_name || 'manual' }}-${GITHUB_SHA::8}"
            VERSION_CLEAN="0.0.0-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_clean=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
          echo "archive=RestOS-POS-${VERSION}-win64.zip" >> $GITHUB_OUTPUT
          echo "installer=RestOS-POS-Setup-${VERSION_CLEAN}.exe" >> $GITHUB_OUTPUT

      - name: Zip release folder
        working-directory: apps/pos/dist
        shell: powershell
        run: |
          Compress-Archive -Path RestOS-POS -DestinationPath "${{ steps.meta.outputs.archive }}"

      # ---- Inno Setup installer (одиночный setup.exe) ----

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        working-directory: apps/pos
        shell: cmd
        run: |
          mkdir installer_output
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.meta.outputs.version_clean }} installer.iss

      - name: Upload artifacts (для проверки до релиза)
        uses: actions/upload-artifact@v4
        with:
          name: RestOS-POS-${{ steps.meta.outputs.version }}
          path: |
            apps/pos/dist/${{ steps.meta.outputs.archive }}
            apps/pos/installer_output/${{ steps.meta.outputs.installer }}
          retention-days: 14

      # ---- релиз только для тегов v* ----

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            apps/pos/dist/${{ steps.meta.outputs.archive }}
            apps/pos/installer_output/${{ steps.meta.outputs.installer }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
