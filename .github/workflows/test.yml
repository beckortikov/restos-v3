name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pos:
    name: POS tests (PySide6, Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Qt runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libgl1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install POS deps
        working-directory: apps/pos
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest (offscreen Qt)
        working-directory: apps/pos
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --tb=short -q

  backend:
    name: Backend tests (Django + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: restos
          POSTGRES_PASSWORD: restos
          POSTGRES_DB: restos_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U restos -d restos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend deps
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        working-directory: apps/backend
        env:
          DATABASE_URL: postgres://restos:restos@localhost:5432/restos_test
          DJANGO_SECRET_KEY: ci-secret-only-for-tests
        run: pytest --tb=short -q -p no:warnings
